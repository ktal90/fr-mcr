<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FR-MCR // CAPABILITIES MATRIX</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap');

  :root {
    --bg: #070a0d;
    --surface: #0d1117;
    --surface-2: #151b23;
    --border: #1c2630;
    --text: #c9d1d9;
    --text-muted: #6e7681;
    --fr-green: #00c853;
    --fr-green-dim: rgba(0,200,83,0.12);
    --fr-green-glow: #00ff88;
    --amber: #f0b429;
    --amber-dim: rgba(240,180,41,0.12);
    --red-alert: #ff3b3b;
    --red-alert-dim: rgba(255,59,59,0.1);
    --cyan: #00d4ff;
    --cyan-dim: rgba(0,212,255,0.08);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', 'SF Mono', 'Fira Code', monospace;
    min-height: 100vh;
    overflow: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(255,255,255,0.02) 2px, rgba(255,255,255,0.02) 4px);
    pointer-events: none;
    z-index: 9999;
  }

  body::after {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none;
    z-index: 0;
  }

  .classification-bar {
    background: var(--surface);
    border-bottom: 2px solid var(--fr-green);
    padding: 8px 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--fr-green);
    position: relative;
    z-index: 10;
  }
  .classification-bar .timestamp { color: var(--text-muted); letter-spacing: 1px; font-size: 10px; }

  .watermark {
    position: fixed;
    bottom: 52px;
    right: 20px;
    font-size: 10px;
    letter-spacing: 2px;
    color: rgba(0,200,83,0.2);
    text-transform: uppercase;
    z-index: 10;
  }

  /* Main layout */
  .main {
    display: flex;
    height: calc(100vh - 82px);
    position: relative;
    z-index: 1;
  }

  /* Hex grid panel */
  .hex-panel {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    position: relative;
  }

  .hex-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 16px;
    max-width: 900px;
    width: 100%;
  }

  /* Offset every other row */
  .hex-grid .hex-card:nth-child(n+6) {
    /* second row offset handled by margin */
  }

  .hex-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px 16px;
    text-align: center;
    cursor: pointer;
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
  }

  .hex-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 3px;
    background: var(--fr-green);
    opacity: 0.3;
    transition: opacity 0.3s;
  }

  .hex-card:hover {
    border-color: var(--fr-green);
    transform: translateY(-2px);
    box-shadow: 0 0 24px rgba(0,200,83,0.15);
  }
  .hex-card:hover::before { opacity: 1; }

  .hex-card.expanded {
    border-color: var(--fr-green);
    box-shadow: 0 0 30px rgba(0,200,83,0.2);
  }

  .hex-icon {
    height: 36px;
    margin-bottom: 8px;
    display: flex;
    justify-content: center;
    align-items: center;
    color: var(--fr-green);
    opacity: 0.85;
  }
  .hex-icon svg { flex-shrink: 0; }

  .sector-badge {
    display: inline-block;
    font-size: 8px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 2px 7px;
    border-radius: 3px;
    margin-top: 5px;
    font-weight: 600;
    border: 1px solid;
  }
  .sector-badge.green {
    color: var(--fr-green);
    border-color: rgba(0,200,83,0.4);
    background: rgba(0,200,83,0.07);
  }
  .sector-badge.amber {
    color: var(--amber);
    border-color: rgba(240,180,41,0.4);
    background: rgba(240,180,41,0.07);
  }

  .hex-name {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--fr-green);
    margin-bottom: 6px;
    line-height: 1.3;
  }

  .hex-count {
    font-size: 20px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 2px;
  }
  .hex-count-label {
    font-size: 9px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  /* Glow intensity based on factory count */
  .hex-card.glow-1 { box-shadow: inset 0 0 20px rgba(0,200,83,0.03); }
  .hex-card.glow-2 { box-shadow: inset 0 0 25px rgba(0,200,83,0.05); }
  .hex-card.glow-3 { box-shadow: inset 0 0 30px rgba(0,200,83,0.08); }
  .hex-card.glow-4 { box-shadow: inset 0 0 35px rgba(0,200,83,0.12); }

  @keyframes hex-pulse {
    0%, 100% { box-shadow: inset 0 0 20px rgba(0,200,83,0.05); }
    50% { box-shadow: inset 0 0 30px rgba(0,200,83,0.12); }
  }
  .hex-card.active-mission {
    animation: hex-pulse 3s ease-in-out infinite;
  }

  /* Expanded factory list */
  .hex-factories {
    display: none;
    margin-top: 10px;
    text-align: left;
    border-top: 1px solid var(--border);
    padding-top: 8px;
  }
  .hex-card.expanded .hex-factories { display: block; }

  .hex-factory-item {
    font-size: 10px;
    padding: 3px 0;
    color: var(--text-muted);
    display: flex;
    justify-content: space-between;
  }
  .hex-factory-item .fname { color: var(--text); }
  .hex-factory-item .floc { color: var(--text-muted); font-size: 9px; }

  /* Right sidebar */
  .stats-panel {
    flex: 0 0 280px;
    border-left: 1px solid var(--border);
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  .panel-header {
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--fr-green);
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }

  .stat-block {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 14px;
  }
  .stat-label {
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 6px;
  }
  .stat-value {
    font-size: 28px;
    font-weight: 700;
    color: var(--fr-green);
    text-shadow: 0 0 10px rgba(0,200,83,0.3);
  }
  .stat-value small { font-size: 14px; color: var(--text-muted); font-weight: 400; }

  .mission-list {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 14px;
    flex: 1;
    min-height: 0;
    overflow-y: auto;
  }
  .mission-item {
    padding: 8px 0;
    border-bottom: 1px solid rgba(28,38,48,0.5);
    font-size: 11px;
    line-height: 1.5;
  }
  .mission-item:last-child { border-bottom: none; }
  .mission-customer { color: var(--fr-green); font-weight: 600; font-size: 10px; letter-spacing: 0.5px; }
  .mission-name { color: var(--text); font-family: 'Inter', system-ui, sans-serif; }

  @keyframes pulse-dot {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }
  .mission-active-dot {
    display: inline-block;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--fr-green);
    box-shadow: 0 0 6px rgba(0,200,83,0.5);
    margin-right: 6px;
    animation: pulse-dot 2s ease-in-out infinite;
  }

  /* Bottom ticker */
  .ticker-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 10px 0;
    overflow: hidden;
    z-index: 10;
  }
  @keyframes ticker-scroll {
    0% { transform: translateX(0); }
    100% { transform: translateX(-50%); }
  }
  .ticker-content {
    display: flex;
    animation: ticker-scroll 40s linear infinite;
    white-space: nowrap;
  }
  .ticker-item {
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 0 32px;
    color: var(--text-muted);
  }
  .ticker-item .cust { color: var(--fr-green); font-weight: 600; }
  .ticker-sep { color: var(--border); padding: 0 8px; }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>

  cuas: `<svg viewBox="0 0 32 32" width="30" height="30" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="16" cy="16" r="10"/><circle cx="16" cy="16" r="4"/><line x1="16" y1="4" x2="16" y2="10"/><line x1="16" y1="22" x2="16" y2="28"/><line x1="4" y1="16" x2="10" y2="16"/><line x1="22" y1="16" x2="28" y2="16"/></svg>`,

// Sector badges
function getSectorBadge(name) {
  if (name.includes('eVTOL')) return { text: 'CERTIFICATION COMPLETE', cls: 'green' };
  if (name.includes('Counter-UAS') || name.includes('CUAS')) return { text: 'UPCOMING GROUND TESTING', cls: 'amber' };
  if (name.includes('Fusion') || name.includes('Energy')) return { text: 'SITE EXPANSION UPCOMING', cls: 'amber' };
  return null;
}

// Render hex grid
const hexGrid = document.getElementById('hex-grid');
verticals.forEach((v, i) => {
  const count = v.factories.length;
  const glowClass = count <= 2 ? 'glow-1' : count <= 3 ? 'glow-2' : count <= 5 ? 'glow-3' : 'glow-4';
  const missionClass = v.activeMission ? 'active-mission' : '';

  const factoryList = v.factories.map(f =>
    `<div class="hex-factory-item"><span class="fname">${f.name}</span><span class="floc">${f.loc}</span></div>`
  ).join('');

  const badge = getSectorBadge(v.name);
  const badgeHtml = badge ? `<div class="sector-badge ${badge.cls}">${badge.text}</div>` : '';

  hexGrid.innerHTML += `
    <div class="hex-card ${glowClass} ${missionClass}" onclick="toggleHex(this)" data-index="${i}">
      <span class="hex-icon">${v.icon}</span>
      <div class="hex-name">${v.name}</div>
      <div class="hex-count">${count}</div>
      <div class="hex-count-label">Factories</div>
      ${badgeHtml}
      <div class="hex-factories">${factoryList}</div>
    </div>
  `;
});

function toggleHex(el) {
  const wasExpanded = el.classList.contains('expanded');
  document.querySelectorAll('.hex-card').forEach(c => c.classList.remove('expanded'));
  if (!wasExpanded) el.classList.add('expanded');
}

];

const missionList = document.getElementById('mission-list');
missions.forEach(m => {
  missionList.innerHTML += `
    <div class="mission-item">
      <span class="mission-active-dot"></span>
      <span class="mission-customer">${m.customer}</span><br>
      <span class="mission-name">${m.name}</span>

// Ticker — codenames only

  { cust: "PHOENIX", mission: "FAA STAGE 4 CERT SPRINT" },
